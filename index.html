<!DOCTYPE html>
<html>
<head>
<title>Semantic Search</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    text-align:center;
}

h1{
    margin-top:60px;
}

.search-box{
    margin-top:40px;
}

input{
    width:400px;
    padding:12px;
    font-size:16px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:12px 20px;
    font-size:16px;
    border:none;
    background:#4285F4;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#3367d6;
}

.results{
    width:700px;
    margin:40px auto;
    text-align:left;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<h1>Semantic Search Engine</h1>

<div class="search-box">
<input type="text" id="query" placeholder="Search anything..." />
<button onclick="search()">Search</button>
</div>

<div class="results" id="results"></div>

<script>

async function search(){

    const query = document.getElementById("query").value;

    const response = await fetch("http://127.0.0.1:8000/query",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            query:query
        })
    });

    const data = await response.json();

    const resultsDiv = document.getElementById("results");

    resultsDiv.innerHTML="";

    if(data.result.length===0){
        resultsDiv.innerHTML="<p>No results found</p>";
        return;
    }

    data.result.forEach(doc=>{

        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=doc;

        resultsDiv.appendChild(card);

    });

}

</script>

</body>
</html>
